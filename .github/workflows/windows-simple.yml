name: Windows Build (Simple)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test shell
        run: |
          Write-Host "Test step 1"
          Write-Host "PATH=$env:PATH"

      - name: Install Python
        run: choco install python -y --no-progress

      - name: Verify Python
        run: python --version

      - name: Install aqtinstall
        run: pip install aqtinstall

      - name: Try Qt 5.15.8 mingw81
        run: aqt install-qt windows desktop 5.15.8 win64_mingw81 -O C:\Qt || echo "mingw81 failed"

      - name: Try Qt 5.15.8 MSVC2019
        if: always()
        run: aqt install-qt windows desktop 5.15.8 win64_msvc2019_64 -O C:\Qt || echo "msvc2019 failed"

      - name: Find Qt directory
        run: |
          $qtDir = Get-ChildItem "C:\Qt\5.15.*" -Directory | Where-Object { $_.Name -match 'mingw|msvc' } | Select-Object -First 1
          if ($qtDir) {
            Write-Host "Found Qt: $($qtDir.FullName)"
          } else {
            Write-Host "No Qt found!"
            exit 1
          }

      - name: Build
        run: |
          $qtDir = Get-ChildItem "C:\Qt\5.15.*" -Directory | Where-Object { $_.Name -match 'mingw|msvc' } | Select-Object -First 1 | ForEach-Object { $_.FullName }
          $env:QtDir = $qtDir
          $env:PATH = "$qtDir\bin;$env:PATH"
          $env:QTDIR = $qtDir
          Write-Host "Using Qt: $qtDir"
          qmake --version
          gcc --version || echo "No gcc (MSVC mode)"
