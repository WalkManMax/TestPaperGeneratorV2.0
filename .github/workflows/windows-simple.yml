name: Windows Build (Simple)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test shell
        run: |
          Write-Host "Test step 1"
          Write-Host "PATH=$env:PATH"

      - name: Install Python
        run: choco install python -y --no-progress

      - name: Verify Python
        run: python --version

      - name: Install aqtinstall
        run: pip install aqtinstall

      - name: Install Qt via Chocolatey
        run: choco install qt5-sdk -y --no-progress

      - name: Find Qt path
        run: |
          Get-ChildItem -Path "C:\ProgramData\Chocolatey\lib" -Filter "Qt*" -Recurse -Directory | Select-Object -First 5
          Get-ChildItem -Path "C:\" -Filter "Qt" -Directory | Select-Object -First 3

      - name: Build
        run: |
          $qtPath = "C:\Qt\5.15.9\mingw81_64"
          if (-not (Test-Path $qtPath)) {
            $qtPath = "C:\Qt\5.15.8\mingw81_64"
          }
          if (-not (Test-Path $qtPath)) {
            $qtPath = Get-ChildItem "C:\Qt\5.*" -Directory | Select-Object -First 1 | ForEach-Object { $_.FullName }
          }
          $env:QtDir = $qtPath
          $env:PATH = "$qtPath\bin;$env:PATH"
          $env:QTDIR = $qtPath
          Write-Host "Using Qt from: $qtPath"
          qmake --version
          gcc --version
