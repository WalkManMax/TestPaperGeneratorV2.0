name: Windows Build (MSYS2 Qt5)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt5 via MSYS2
        run: |
          C:\tools\msys64\usr\bin\bash -lc "pacman -Sy --noconfirm mingw-w64-x86_64-qt5-base mingw-w64-x86_64-qt5-quickcontrols mingw-w64-x86_64-qt5-tools mingw-w64-x86_64-make"

      - name: Verify Qt installation
        run: |
          C:\tools\msys64\usr\bin\bash -lc "qmake --version && gcc --version"

      - name: Setup library files
        run: |
          New-Item -ItemType Directory -Force -Path "libxl\include_cpp" | Out-Null
          New-Item -ItemType Directory -Force -Path "libxl\lib64" | Out-Null
          # Copy headers
          Get-ChildItem "libxl" -Recurse -Filter "*.h" | ForEach-Object {
            $dest = "libxl\include_cpp\$($_.Name)"
            if (-not (Test-Path $dest)) { Copy-Item $_.FullName "libxl\include_cpp\" -Force }
          }
          # Copy libs
          if ((Test-Path "libxl\lib\libxl.lib") -and -not (Test-Path "libxl\lib64\libxl.lib")) {
            Copy-Item "libxl\lib\libxl.lib" "libxl\lib64\libxl.lib" -Force
          }
          if ((Test-Path "libxl\bin\libxl.dll") -and -not (Test-Path "libxl\lib64\libxl.dll")) {
            Copy-Item "libxl\bin\libxl.dll" "libxl\lib64\libxl.dll" -Force
          }
          Write-Host "libxl contents:"
          Get-ChildItem "libxl" -Recurse -File | Select-Object FullName

      - name: Build with qmake
        run: |
          C:\tools\msys64\usr\bin\bash -lc "cd /d/a/TestPaperGeneratorV2.0/TestPaperGeneratorV2.0 && qmake TestPaperDemo1.pro -spec win32-g++ 'CONFIG+=release'"
          C:\tools\msys64\usr\bin\bash -lc "cd /d/a/TestPaperGeneratorV2.0/TestPaperGeneratorV2.0 && mingw32-make -j4"

      - name: Copy runtime DLLs
        run: |
          C:\tools\msys64\usr\bin\bash -lc "cd /d/a/TestPaperGeneratorV2.0/TestPaperGeneratorV2.0 && mkdir -p release/plugins && cp mingw64/bin/libgcc_s_seh-1.dll mingw64/bin/libstdc++-6.dll mingw64/bin/libwinpthread-1.dll release/ 2>/dev/null; cp mingw64/bin/Qt5*.dll release/ 2>/dev/null; cp libxl/lib64/libxl.dll release/ 2>/dev/null; cp -r mingw64/plugins/platforms release/plugins/ 2>/dev/null; cp -r mingw64/plugins/controls release/plugins/ 2>/dev/null; cp -r mingw64/plugins/layouts release/plugins/ 2>/dev/null; ls -la release/"
          Get-ChildItem "release" -Recurse | Select-Object FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TestPaperGenerator-Windows
          path: release/*.exe
          retention-days: 30
