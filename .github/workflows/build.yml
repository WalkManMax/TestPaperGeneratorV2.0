name: Build Windows Executable

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq mingw-w64 cmake

      - name: Build with MXE
        run: |
          docker pull mxe/mxe:latest || true
          docker run --rm -v "${{ github.workspace }}:/src" mxe/mxe:latest \
            sh -c "cd /src && \
              x86_64-w64-mingw32.static-qmake-qt5 TestPaperDemo1.pro -spec linux-g++ -o Makefile && \
              x86_64-w64-mingw32.static-make -j$(nproc) || true"

      - name: Create release package
        run: |
          mkdir -p release
          find . -name "*.exe" -type f 2>/dev/null | head -5

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TestPaperGenerator-Windows
          path: release/*.exe
          retention-days: 30
