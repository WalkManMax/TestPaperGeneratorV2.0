name: Build TestPaperGeneratorV2.0

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          qtbase5-dev \
          qtdeclarative5-dev \
          qtquickcontrols2-5-dev \
          libgl1-mesa-dev \
          libfontconfig1-dev \
          libfreetype6-dev
        
    - name: Build minidocx
      run: |
        cd minidocx-src
        mkdir -p build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
        
    - name: Compile TestPaperGeneratorV2.0
      run: |
        cd project
        qmake TestPaperDemo1.pro
        make -j$(nproc)
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TestPaperDemo1
        path: project/TestPaperDemo1
