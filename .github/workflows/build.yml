name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/qt-action@v3
        with:
          version: '5.15.2'
          dir: 'C:\Qt'
          modules: 'qtquick2 qtquickcontrols2'
          tools: 'qt.tools.mingw730'

      - name: Setup MinGW
        shell: pwsh
        run: |
          $env:PATH = "C:\Qt\Tools\mingw730_64\bin;C:\Qt\5.15.2\mingw73_64\bin;$env:PATH"
          $env:QTDIR = "C:\Qt\5.15.2\mingw73_64"
          $env:PATH = "$env:QTDIR\bin;" + $env:PATH
          gcc --version

      - name: Create libxl placeholders
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "libxl/include_cpp" | Out-Null
          New-Item -ItemType Directory -Force -Path "libxl/lib64" | Out-Null
          New-Item -ItemType Directory -Force -Path "libxl/bin" | Out-Null
          Write-Host "libxl placeholder directories created"
          Write-Host "NOTE: Place your libxl files manually or use paid version"

      - name: Prepare pro file
        shell: pwsh
        run: |
          $pro = @'
QT += quick quickcontrols2
CONFIG += c++20 utf8_source
RC_ICONS = main.ico
INCLUDEPATH += $$PWD/libxl/include_cpp
LIBS += $$PWD/libxl/lib64/libxl.lib
INCLUDEPATH += $$PWD/minidocx/include
LIBS += -L$$PWD/minidocx/lib -llibminidocx
DEFINES += QT_DEPRECATED_WARNINGS
SOURCES += cservicebackend.cpp main.cpp orderedmap.cpp tablemodel.cpp
RESOURCES += qml.qrc
HEADERS += common.h cservicebackend.h minidocx/include/minidocx.hpp orderedmap.h tablemodel.h
DISTFILES += minidocx/lib/libminidocx.a
'@
          Set-Content -Path "TestPaperDemo1.pro" -Value $pro -Encoding UTF8

      - name: Build
        shell: pwsh
        run: |
          $env:PATH = "C:\Qt\Tools\mingw730_64\bin;C:\Qt\5.15.2\mingw73_64\bin;$env:PATH"
          $env:QTDIR = "C:\Qt\5.15.2\mingw73_64"
          $env:PATH = "$env:QTDIR\bin;" + $env:PATH
          $env:QMAKE = "C:\Qt\5.15.2\mingw73_64\bin\qmake.exe"
          & qmake TestPaperDemo1.pro -spec win32-g++ "CONFIG+=release"
          & mingw32-make -j4

      - name: Copy runtime
        shell: pwsh
        run: |
          $dlls = @(
            "libgcc_s_seh-1.dll","libstdc++-6.dll","libwinpthread-1.dll",
            "Qt5Core.dll","Qt5Gui.dll","Qt5Quick.dll","Qt5QuickControls2.dll",
            "Qt5Qml.dll","Qt5QmlModels.dll","libminidocx.dll"
          )
          $src = "C:\Qt\5.15.2\mingw73_64\bin"
          $dest = "release"
          foreach ($dll in $dlls) {
            if (Test-Path "$src\$dll") { Copy-Item "$src\$dll" -Destination $dest -Force }
          }
          if (Test-Path "libxl\bin\libxl.dll") { Copy-Item "libxl\bin\libxl.dll" -Destination $dest -Force }
          $pluginDirs = @("platforms","controls","layouts")
          foreach ($dir in $pluginDirs) {
            $sp = "C:\Qt\5.15.2\mingw73_64\plugins\$dir"
            if (Test-Path $sp) {
              $dp = "$dest\plugins\$dir"
              New-Item -ItemType Directory -Force -Path $dp | Out-Null
              Copy-Item "$sp\*" -Destination $dp -Force -Recurse
            }
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TestPaperGenerator-Windows
          path: release/*.exe
          retention-days: 30
